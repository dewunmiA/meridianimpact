<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" fill="none">
  
  <defs>
    <filter id="mig-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"></feGaussianBlur>
      <feOffset dx="0" dy="2"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <g stroke="#1A1A2E" stroke-opacity="0.18" stroke-width="1" fill="none">
    <line x1="160" y1="100" x2="380" y2="60"></line>
    <line x1="160" y1="100" x2="280" y2="200"></line>
    <line x1="380" y1="60" x2="560" y2="120"></line>
    <line x1="380" y1="60" x2="280" y2="200"></line>
    <line x1="280" y1="200" x2="560" y2="120"></line>
    <line x1="280" y1="200" x2="500" y2="280"></line>
    <line x1="560" y1="120" x2="500" y2="280"></line>
    <line x1="160" y1="100" x2="500" y2="280"></line>
    
    <line x1="80" y1="200" x2="160" y2="100"></line>
    <line x1="640" y1="240" x2="560" y2="120"></line>
    <line x1="600" y1="40" x2="380" y2="60"></line>
  </g>

  
  <g font-family="&#39;DM Sans&#39;, Arial, sans-serif" font-weight="600" font-size="13" filter="url(#mig-shadow)">
    
    <g>
      <rect x="60" y="80" width="200" height="40" rx="20" fill="#FFFFFF" stroke="#E8E8E8"></rect>
      <circle cx="82" cy="100" r="6" fill="#E8522F"></circle>
      <text x="98" y="105" fill="#1A1A2E">Impact Positioning</text>
    </g>
    
    <g>
      <rect x="290" y="40" width="200" height="40" rx="20" fill="#FFFFFF" stroke="#E8E8E8"></rect>
      <circle cx="312" cy="60" r="6" fill="#E8522F"></circle>
      <text x="328" y="65" fill="#1A1A2E">Programme Design</text>
    </g>
    
    <g>
      <rect x="470" y="100" width="220" height="40" rx="20" fill="#FFFFFF" stroke="#E8E8E8"></rect>
      <circle cx="492" cy="120" r="6" fill="#E8522F"></circle>
      <text x="508" y="125" fill="#1A1A2E">Partnership Management</text>
    </g>
    
    <g>
      <rect x="200" y="180" width="180" height="40" rx="20" fill="#1A1A2E"></rect>
      <circle cx="222" cy="200" r="6" fill="#E8522F"></circle>
      <text x="238" y="205" fill="#FFFFFF">Impact Intelligence</text>
    </g>
    
    <g>
      <rect x="410" y="260" width="180" height="40" rx="20" fill="#FFFFFF" stroke="#E8E8E8"></rect>
      <circle cx="432" cy="280" r="6" fill="#E8522F"></circle>
      <text x="448" y="285" fill="#1A1A2E">Documented Return</text>
    </g>
  </g>

  
  <g fill="#E8522F">
    <circle cx="80" cy="200" r="4"></circle>
    <circle cx="640" cy="240" r="4"></circle>
    <circle cx="600" cy="40" r="4"></circle>
  </g>
  <g fill="#1A1A2E" fill-opacity="0.25">
    <circle cx="120" cy="40" r="3"></circle>
    <circle cx="680" cy="80" r="3"></circle>
    <circle cx="40" cy="280" r="3"></circle>
    <circle cx="660" cy="320" r="3"></circle>
  </g>
</svg>